services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=EmployeeTaskApi;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True
      Jwt__Issuer: EmployeeTaskApi
      Jwt__Audience: EmployeeTaskApi.Client
      Jwt__SigningKey: local-development-signing-key-change-before-production-12345
      Jwt__ExpirationMinutes: 60
      Database__ApplyMigrations: true
    depends_on:
      - sqlserver

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: YourStrong!Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  sqlserver-data:
